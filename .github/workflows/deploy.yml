name: Deploy MCP Server

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /home/ubuntu/AI_project
      SERVICE_NAME: mcp
      PYTHON: python3
      REPO_URL: https://github.com/abdulhanan1111/MCP_SERVER.git
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: APP_DIR,SERVICE_NAME,PYTHON,REPO_URL
          script: |
            set -e
            if [ -z "$APP_DIR" ]; then
              echo "APP_DIR is empty" >&2
              exit 1
            fi
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git pull
            if ! dpkg -s python3-venv >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y python3-venv
            fi
            if [ ! -d "$APP_DIR/.venv" ]; then
              $PYTHON -m venv "$APP_DIR/.venv"
            fi
            . "$APP_DIR/.venv/bin/activate"
            python -m pip install --upgrade pip
            pip install -r "$APP_DIR/mcp-server/requirements.txt"
            sudo systemctl restart "$SERVICE_NAME"
            sudo systemctl status "$SERVICE_NAME" --no-pager -l | head -n 50
